<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal App Bookmarks</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Cyber-Glass Palette copied/adapted from Timer.html */
      --bg-dark: #050505;
      --glass-bg: rgba(20, 20, 30, 0.70);
      --glass-bg-strong: rgba(10, 10, 15, 0.92);
      --glass-border: rgba(255, 255, 255, 0.08);
      --neon-green: #00ff9d;
      --neon-red: #ff0055;
      --neon-blue: #00f3ff;
      --neon-yellow: #ffe600;
      --neon-purple: #bd00ff;
      --text-primary: #ffffff;
      --text-muted: #8899a6;
      --input-bg: rgba(0, 0, 0, 0.30);
      --font-display: 'JetBrains Mono', monospace;
      --font-body: 'Inter', sans-serif;

      /* Existing app variable aliases */
      --bg: var(--bg-dark);
      --card: var(--glass-bg);
      --card-strong: var(--glass-bg-strong);
      --text: var(--text-primary);
      --muted: var(--text-muted);
      --line: var(--glass-border);
      --accent: var(--neon-blue);
      --danger: var(--neon-red);
      --radius: 8px;
      --blur: blur(20px);
      --shadow: 0 0 30px rgba(0, 243, 255, 0.16), 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text-primary);
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
    }

    body.light-mode {
      --bg-dark: #eef2f6;
      --glass-bg: rgba(255, 255, 255, 0.76);
      --glass-bg-strong: rgba(255, 255, 255, 0.96);
      --glass-border: rgba(0, 0, 0, 0.10);
      --neon-blue: #008eb3;
      --neon-green: #00a86b;
      --neon-red: #d60047;
      --neon-yellow: #b8a500;
      --neon-purple: #9000c4;
      --text-primary: #1a202c;
      --text-muted: #586878;
      --input-bg: rgba(255, 255, 255, 0.80);
      --shadow: 0 0 30px rgba(0, 142, 179, 0.12), 0 8px 32px rgba(15, 23, 42, 0.10);
      --shadow-soft: 0 8px 32px rgba(15, 23, 42, 0.08);
      color-scheme: light;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.05), transparent 25%);
    }

    body.light-mode::before {
      background:
        linear-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px);
    }

    button,
    input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    .card:focus-visible {
      outline: 2px solid var(--neon-blue);
      outline-offset: 3px;
    }

    .page {
      width: min(1740px, calc(100% - 80px));
      margin: 0 auto;
      padding: 76px 0 70px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 46px;
    }

    .topbar-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex: 0 0 auto;
    }

    .search-shell {
      flex: 1;
      height: 92px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      position: relative;
      overflow: hidden;
    }

    .search-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .search-shell:focus-within {
      border-color: rgba(0, 243, 255, 0.48);
      box-shadow: 0 0 28px rgba(0, 243, 255, 0.18), var(--shadow-soft);
    }

    .search-shell svg {
      width: 34px;
      height: 34px;
      color: var(--neon-blue);
      flex: 0 0 auto;
      filter: drop-shadow(0 0 8px rgba(0, 243, 255, 0.35));
    }

    #searchInput {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text-primary);
      font-size: 18px;
      letter-spacing: 0;
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--neon-blue);
      background: var(--input-bg);
      font-family: var(--font-display);
      font-size: 17px;
      line-height: 1;
      user-select: none;
    }

    .add-btn,
    .theme-btn {
      height: 92px;
      min-width: 154px;
      border: 1px solid rgba(0, 243, 255, 0.3);
      border-radius: 8px;
      color: var(--neon-blue);
      background: rgba(0, 243, 255, 0.05);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .theme-btn {
      min-width: 126px;
    }

    .add-btn:hover,
    .theme-btn:hover {
      transform: scale(1.02) translateY(-2px);
      background: var(--neon-blue);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 30px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      min-height: 0;
      padding: 30px 22px 24px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      background: var(--glass-bg);
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      cursor: pointer;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.10), transparent 45%);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.18), 0 12px 36px rgba(0, 0, 0, 0.32);
      border-color: rgba(0, 243, 255, 0.42);
      background: rgba(20, 20, 30, 0.82);
    }

    body.light-mode .card:hover {
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:active {
      transform: translateY(-1px);
    }

    .icon-wrap {
      width: 57px;
      height: 57px;
      margin: 6px auto 20px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 18px rgba(0, 243, 255, 0.06), 0 0 18px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .icon-wrap img {
      width: 45px;
      height: 45px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
    }

    .fallback-icon {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(0, 243, 255, 0.85), rgba(189, 0, 255, 0.8));
      color: #000;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 0 22px rgba(0, 243, 255, 0.22);
    }

    .name {
      margin: 0 0 8px;
      max-width: 100%;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .domain {
      margin: 0;
      max-width: 100%;
      color: var(--text-muted);
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 34px;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 2;
      gap: 4px;
      grid-template-rows: repeat(3, 4px);
      transition: all 0.2s;
    }

    .menu-btn:hover {
      color: var(--neon-blue);
      border-color: rgba(0, 243, 255, 0.26);
      background: rgba(0, 243, 255, 0.06);
      box-shadow: 0 0 14px rgba(0, 243, 255, 0.18);
      transform: none;
    }

    .menu-btn span,
    .menu-btn::before,
    .menu-btn::after {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    .card-menu {
      position: absolute;
      top: 56px;
      right: 18px;
      width: 150px;
      padding: 8px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(10, 10, 15, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      z-index: 5;
      display: none;
      text-align: left;
    }

    body.light-mode .card-menu {
      background: rgba(255, 255, 255, 0.96);
    }

    .card-menu.open {
      display: block;
    }

    .card-menu button {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .card-menu button:hover {
      border-color: rgba(0, 243, 255, 0.22);
      background: rgba(0, 243, 255, 0.06);
      color: var(--neon-blue);
      box-shadow: none;
      transform: none;
    }

    .card-menu .danger {
      color: var(--danger);
    }

    .card-menu .danger:hover {
      border-color: rgba(255, 0, 85, 0.28);
      background: rgba(255, 0, 85, 0.08);
      color: var(--neon-red);
    }

    .empty {
      grid-column: 1 / -1;
      padding: 70px 20px;
      border: 1px dashed var(--glass-border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--text-muted);
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .empty h2 {
      margin: 0 0 8px;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      padding: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 50;
    }

    body.light-mode .modal-backdrop {
      background: rgba(15, 23, 42, 0.22);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      padding: 26px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(10, 10, 15, 0.96);
      color: var(--text-primary);
      box-shadow: 0 0 42px rgba(0, 243, 255, 0.14), 0 35px 90px rgba(0, 0, 0, 0.48);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    body.light-mode .modal {
      background: var(--glass-bg-strong);
      box-shadow: 0 0 42px rgba(0, 142, 179, 0.10), 0 35px 90px rgba(15, 23, 42, 0.18);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 12px;
    }

    .modal h2 {
      margin: 0;
      color: var(--neon-blue);
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 243, 255, 0.18);
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--input-bg);
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: var(--neon-red);
      border-color: var(--neon-red);
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.45);
      transform: scale(1.02);
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input {
      width: 100%;
      height: 54px;
      padding: 0 15px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      outline: 0;
      color: var(--neon-blue);
      background: var(--input-bg);
      font-family: var(--font-display);
      font-size: 16px;
      transition: 0.3s;
    }

    input:focus {
      border-color: rgba(0, 243, 255, 0.55);
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.16);
      background: rgba(0, 0, 0, 0.48);
    }

    .hint {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      margin-top: -7px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 22px;
    }

    .secondary,
    .primary {
      height: 48px;
      padding: 0 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .secondary {
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-muted);
    }

    .secondary:hover {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: none;
      transform: scale(1.02);
    }

    .primary {
      border: 1px solid rgba(0, 243, 255, 0.3);
      background: rgba(0, 243, 255, 0.05);
      color: var(--neon-blue);
    }

    .primary:hover {
      background: var(--neon-blue);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
      transform: scale(1.02);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 30px;
    }

    .tiny-btn {
      border: 1px solid var(--glass-border);
      background: rgba(0, 243, 255, 0.03);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 11px 14px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .tiny-btn:hover {
      border-color: rgba(0, 243, 255, 0.35);
      color: var(--neon-blue);
      background: rgba(0, 243, 255, 0.07);
      box-shadow: 0 0 18px rgba(0, 243, 255, 0.22);
      transform: translateY(-1px);
    }

    @media (max-width: 1320px) {
      .grid {
        grid-template-columns: repeat(5, minmax(150px, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(4, minmax(140px, 1fr));
      }

      .page {
        width: min(100% - 46px, 1740px);
      }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 28px, 1740px);
        padding: 24px 0 38px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
        margin-bottom: 22px;
      }

      .topbar-actions {
        width: 100%;
      }

      .search-shell {
        height: 68px;
        padding: 0 18px;
        gap: 14px;
      }

      .search-shell svg {
        width: 25px;
        height: 25px;
      }

      #searchInput {
        font-size: 17px;
      }

      .kbd {
        display: none;
      }

      .add-btn,
      .theme-btn {
        height: 56px;
        min-width: 0;
        font-size: 0.85rem;
        flex: 1;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        aspect-ratio: 1 / 1;
        min-height: 0;
        padding: 24px 14px 18px;
      }

      .icon-wrap {
        width: 44px;
        height: 44px;
        margin: 3px auto 14px;
      }

      .icon-wrap img,
      .fallback-icon {
        width: 36px;
        height: 36px;
      }

      .name {
        font-size: 15px;
      }

      .domain {
        font-size: 13px;
      }

      .menu-btn {
        top: 13px;
        right: 13px;
      }

      .toolbar {
        justify-content: center;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="search-shell">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.75 18.5a7.75 7.75 0 1 1 0-15.5 7.75 7.75 0 0 1 0 15.5Z" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
          <path d="m16.6 16.6 4.4 4.4" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Search for apps, websites, bookmarks..." autocomplete="off" />
        <div class="kbd"><span id="modKey">Ctrl</span><span>K</span></div>
      </div>
      <div class="topbar-actions">
        <button class="theme-btn" id="themeButton" type="button" aria-pressed="false">Bright</button>
        <button class="add-btn" id="addButton">+ Add Link</button>
      </div>
    </section>

    <section class="grid" id="grid"></section>

    <div class="toolbar">
      <button class="tiny-btn" id="exportButton">Export</button>
      <button class="tiny-btn" id="importButton">Import</button>
      <input id="importFile" type="file" accept="application/json" hidden />
      <button class="tiny-btn" id="resetButton">Reset</button>
    </div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="bookmarkForm">
      <div class="modal-head">
        <h2 id="modalTitle">Add Link</h2>
        <button type="button" class="close-btn" id="closeModal" aria-label="Close">&times;</button>
      </div>

      <div class="form-grid">
        <label>
          App name
          <input id="nameInput" required maxlength="40" placeholder="ChatGPT" />
        </label>

        <label>
          Link URL
          <input id="urlInput" required placeholder="https://chat.openai.com" />
        </label>

        <label>
          Icon URL
          <input id="iconInput" placeholder="Optional. Leave empty to auto-detect favicon." />
        </label>
        <div class="hint">Tip: paste a direct image URL for a custom icon, or leave empty.</div>
      </div>

      <div class="actions">
        <button type="button" class="secondary" id="cancelButton">Cancel</button>
        <button type="submit" class="primary">Apply and Save</button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = "personal_bookmark_app_store_v1";
    const THEME_KEY = "personal_bookmark_theme_v1";

    const defaults = [
      { name: "Google", url: "https://google.com" },
      { name: "YouTube", url: "https://youtube.com" },
      { name: "Gmail", url: "https://mail.google.com" },
      { name: "Notion", url: "https://notion.so" },
      { name: "Slack", url: "https://slack.com" },
      { name: "Figma", url: "https://figma.com" },
      { name: "GitHub", url: "https://github.com" },
      { name: "Linear", url: "https://linear.app" },
      { name: "Trello", url: "https://trello.com" },
      { name: "Dropbox", url: "https://dropbox.com" },
      { name: "Calendar", url: "https://calendar.google.com" },
      { name: "Drive", url: "https://drive.google.com" },
      { name: "X (Twitter)", url: "https://x.com" },
      { name: "LinkedIn", url: "https://linkedin.com" },
      { name: "ChatGPT", url: "https://chat.openai.com" },
      { name: "Medium", url: "https://medium.com" },
      { name: "Stripe", url: "https://stripe.com" },
      { name: "AWS Console", url: "https://console.aws.amazon.com" }
    ];

    let bookmarks = [];
    let editingId = null;

    const grid = document.getElementById("grid");
    const searchInput = document.getElementById("searchInput");
    const addButton = document.getElementById("addButton");
    const themeButton = document.getElementById("themeButton");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const bookmarkForm = document.getElementById("bookmarkForm");
    const modalTitle = document.getElementById("modalTitle");
    const nameInput = document.getElementById("nameInput");
    const urlInput = document.getElementById("urlInput");
    const iconInput = document.getElementById("iconInput");
    const closeModal = document.getElementById("closeModal");
    const cancelButton = document.getElementById("cancelButton");
    const exportButton = document.getElementById("exportButton");
    const importButton = document.getElementById("importButton");
    const importFile = document.getElementById("importFile");
    const resetButton = document.getElementById("resetButton");
    const modKey = document.getElementById("modKey");

    modKey.textContent = navigator.platform.toLowerCase().includes("mac") ? "Cmd" : "Ctrl";

    function applyTheme(theme) {
      const isBright = theme === "bright";
      document.body.classList.toggle("light-mode", isBright);
      themeButton.textContent = isBright ? "Dark" : "Bright";
      themeButton.setAttribute("aria-pressed", String(isBright));
      themeButton.setAttribute("aria-label", isBright ? "Switch to dark theme" : "Switch to bright theme");
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY);
      applyTheme(savedTheme === "bright" ? "bright" : "dark");
    }

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function normalizeUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getHostname(url) {
      try {
        return new URL(normalizeUrl(url)).hostname.replace(/^www\./, "");
      } catch {
        return url;
      }
    }

    function faviconUrl(url) {
      const domain = getHostname(url);
      return "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(domain) + "&sz=128";
    }

    function initials(name) {
      return String(name || "?")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(word => word[0])
        .join("")
        .toUpperCase();
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length) {
          bookmarks = saved;
          return;
        }
      } catch {}
      bookmarks = defaults.map(item => ({ id: uid(), icon: "", ...item }));
      save();
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function closeMenus() {
      document.querySelectorAll(".card-menu.open").forEach(menu => menu.classList.remove("open"));
    }

    function render() {
      closeMenus();
      const query = searchInput.value.trim().toLowerCase();
      const items = bookmarks.filter(item => {
        const haystack = [item.name, item.url, getHostname(item.url)].join(" ").toLowerCase();
        return haystack.includes(query);
      });

      grid.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "<h2>No bookmarks found</h2><p>Add a new link or change the search.</p>";
        grid.appendChild(empty);
        return;
      }

      for (const item of items) {
        const card = document.createElement("article");
        card.className = "card";
        card.tabIndex = 0;
        card.setAttribute("role", "link");
        card.setAttribute("aria-label", "Open " + item.name);

        const menuButton = document.createElement("button");
        menuButton.className = "menu-btn";
        menuButton.type = "button";
        menuButton.setAttribute("aria-label", "Options for " + item.name);
        menuButton.innerHTML = "<span></span>";

        const menu = document.createElement("div");
        menu.className = "card-menu";
        menu.innerHTML = `
          <button type="button" data-action="edit">Edit</button>
          <button type="button" class="danger" data-action="delete">Delete</button>
        `;

        const iconWrap = document.createElement("div");
        iconWrap.className = "icon-wrap";

        const img = document.createElement("img");
        img.alt = "";
        img.src = item.icon ? item.icon : faviconUrl(item.url);
        img.referrerPolicy = "no-referrer";
        img.onerror = () => {
          iconWrap.innerHTML = `<div class="fallback-icon">${initials(item.name)}</div>`;
        };
        iconWrap.appendChild(img);

        const name = document.createElement("h3");
        name.className = "name";
        name.textContent = item.name;

        const domain = document.createElement("p");
        domain.className = "domain";
        domain.textContent = getHostname(item.url);

        card.append(menuButton, menu, iconWrap, name, domain);

        card.addEventListener("click", event => {
          if (event.target.closest("button") || event.target.closest(".card-menu")) return;
          window.open(normalizeUrl(item.url), "_blank", "noopener,noreferrer");
        });

        card.addEventListener("keydown", event => {
          if (event.key === "Enter") window.open(normalizeUrl(item.url), "_blank", "noopener,noreferrer");
        });

        menuButton.addEventListener("click", event => {
          event.stopPropagation();
          const wasOpen = menu.classList.contains("open");
          closeMenus();
          if (!wasOpen) menu.classList.add("open");
        });

        menu.addEventListener("click", event => {
          event.stopPropagation();
          const action = event.target.dataset.action;
          if (action === "edit") openModal(item);
          if (action === "delete") deleteBookmark(item.id);
        });

        grid.appendChild(card);
      }
    }

    function openModal(item = null) {
      closeMenus();
      editingId = item ? item.id : null;
      modalTitle.textContent = item ? "Edit Link" : "Add Link";
      nameInput.value = item ? item.name : "";
      urlInput.value = item ? item.url : "";
      iconInput.value = item ? item.icon || "" : "";
      modalBackdrop.classList.add("open");
      setTimeout(() => nameInput.focus(), 0);
    }

    function closeModalNow() {
      modalBackdrop.classList.remove("open");
      bookmarkForm.reset();
      editingId = null;
    }

    function deleteBookmark(id) {
      const item = bookmarks.find(bookmark => bookmark.id === id);
      if (!item) return;
      if (!confirm(`Delete "${item.name}"?`)) return;
      bookmarks = bookmarks.filter(bookmark => bookmark.id !== id);
      save();
      render();
    }

    bookmarkForm.addEventListener("submit", event => {
      event.preventDefault();

      const data = {
        name: nameInput.value.trim(),
        url: normalizeUrl(urlInput.value),
        icon: iconInput.value.trim()
      };

      if (!data.name || !data.url) return;

      if (editingId) {
        bookmarks = bookmarks.map(item => item.id === editingId ? { ...item, ...data } : item);
      } else {
        bookmarks.unshift({ id: uid(), ...data });
      }

      save();
      closeModalNow();
      render();
    });

    searchInput.addEventListener("input", render);
    addButton.addEventListener("click", () => openModal());
    themeButton.addEventListener("click", () => {
      const nextTheme = document.body.classList.contains("light-mode") ? "dark" : "bright";
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
    });
    closeModal.addEventListener("click", closeModalNow);
    cancelButton.addEventListener("click", closeModalNow);

    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) closeModalNow();
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".card-menu") && !event.target.closest(".menu-btn")) closeMenus();
    });

    document.addEventListener("keydown", event => {
      const cmdK = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k";
      if (cmdK) {
        event.preventDefault();
        searchInput.focus();
      }
      if (event.key === "Escape") {
        closeMenus();
        if (modalBackdrop.classList.contains("open")) closeModalNow();
      }
    });

    exportButton.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(bookmarks, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "bookmarks.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    importButton.addEventListener("click", () => importFile.click());

    importFile.addEventListener("change", async () => {
      const file = importFile.files[0];
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!Array.isArray(imported)) throw new Error("Invalid file");
        bookmarks = imported
          .filter(item => item && item.name && item.url)
          .map(item => ({
            id: item.id || uid(),
            name: String(item.name).trim(),
            url: normalizeUrl(item.url),
            icon: String(item.icon || "").trim()
          }));
        save();
        render();
      } catch {
        alert("Could not import this JSON file.");
      } finally {
        importFile.value = "";
      }
    });

    resetButton.addEventListener("click", () => {
      if (!confirm("Reset all bookmarks to the default list?")) return;
      localStorage.removeItem(STORAGE_KEY);
      load();
      render();
    });

    loadTheme();
    load();
    render();
  </script>
</body>
</html>
