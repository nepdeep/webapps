<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Terminal Neon Palette */
      --bg-dark: #020403;
      --glass-bg: rgba(3, 14, 11, 0.88);
      --glass-bg-strong: rgba(1, 8, 6, 0.97);
      --glass-border: rgba(0, 255, 157, 0.18);
      --neon-green: #00ff9d;
      --neon-red: #ff3366;
      --neon-blue: #00f5d4;
      --neon-yellow: #d7ff6a;
      --neon-purple: #8c5cff;
      --text-primary: #e8fff5;
      --text-muted: #72a993;
      --input-bg: rgba(0, 12, 8, 0.72);
      --font-display: 'JetBrains Mono', monospace;
      --font-body: 'JetBrains Mono', monospace;

      /* Existing app variable aliases */
      --bg: var(--bg-dark);
      --card: var(--glass-bg);
      --card-strong: var(--glass-bg-strong);
      --text: var(--text-primary);
      --muted: var(--text-muted);
      --line: var(--glass-border);
      --accent: var(--neon-blue);
      --danger: var(--neon-red);
      --radius: 8px;
      --blur: blur(8px);
      --shadow: 0 0 0 1px rgba(0, 255, 157, 0.08), 0 16px 40px rgba(0, 0, 0, 0.44);
      --shadow-soft: 0 0 0 1px rgba(0, 255, 157, 0.04), 0 10px 28px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text-primary);
      background-color: var(--bg-dark);
      background-image:
        linear-gradient(180deg, rgba(0, 255, 157, 0.045), transparent 36%),
        linear-gradient(90deg, rgba(0, 245, 212, 0.04), transparent 45%);
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(rgba(0, 255, 157, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 157, 0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
    }

    body.light-mode {
      --bg-dark: #eef2f6;
      --glass-bg: rgba(255, 255, 255, 0.76);
      --glass-bg-strong: rgba(255, 255, 255, 0.96);
      --glass-border: rgba(0, 0, 0, 0.10);
      --neon-blue: #008eb3;
      --neon-green: #00a86b;
      --neon-red: #d60047;
      --neon-yellow: #b8a500;
      --neon-purple: #9000c4;
      --text-primary: #1a202c;
      --text-muted: #586878;
      --input-bg: rgba(255, 255, 255, 0.80);
      --shadow: 0 0 30px rgba(0, 142, 179, 0.12), 0 8px 32px rgba(15, 23, 42, 0.10);
      --shadow-soft: 0 8px 32px rgba(15, 23, 42, 0.08);
      color-scheme: light;
      background-image:
        linear-gradient(180deg, rgba(0, 142, 179, 0.08), transparent 38%),
        linear-gradient(90deg, rgba(0, 168, 107, 0.06), transparent 48%);
    }

    body.light-mode::before {
      background:
        linear-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px);
    }

    button,
    input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    .card:focus-visible {
      outline: 2px solid var(--neon-blue);
      outline-offset: 3px;
    }

    .page {
      width: min(1740px, calc(100% - 80px));
      margin: 0 auto;
      padding: 76px 0 70px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 46px;
    }

    .sidebar-toggle {
      width: 92px;
      height: 92px;
      flex: 0 0 92px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(0, 255, 157, 0.32);
      border-radius: 8px;
      color: var(--neon-green);
      background: rgba(0, 255, 157, 0.045);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: all 0.2s;
    }

    .sidebar-toggle:hover {
      transform: scale(1.02) translateY(-2px);
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.42);
    }

    .burger-lines {
      width: 28px;
      display: grid;
      gap: 6px;
    }

    .burger-lines span {
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 10px rgba(0, 255, 157, 0.42);
    }

    .search-shell {
      flex: 1;
      height: 92px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      position: relative;
      overflow: hidden;
    }

    .search-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .search-shell:focus-within {
      border-color: rgba(0, 245, 212, 0.52);
      box-shadow: 0 0 0 1px rgba(0, 245, 212, 0.16), 0 0 22px rgba(0, 255, 157, 0.12), var(--shadow-soft);
    }

    .search-shell svg {
      width: 34px;
      height: 34px;
      color: var(--neon-green);
      flex: 0 0 auto;
      filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.35));
    }

    #searchInput {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text-primary);
      font-size: 18px;
      letter-spacing: 0;
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--neon-green);
      background: var(--input-bg);
      font-family: var(--font-display);
      font-size: 17px;
      line-height: 1;
      user-select: none;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.52);
      opacity: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.2s ease;
    }

    .sidebar-backdrop.open {
      pointer-events: auto;
      opacity: 1;
    }

    .sidebar {
      position: fixed;
      top: 0;
      right: auto;
      bottom: 0;
      left: -360px;
      z-index: 41;
      width: min(330px, calc(100vw - 28px));
      padding: 24px;
      border-right: 1px solid rgba(0, 255, 157, 0.26);
      background: var(--glass-bg-strong);
      box-shadow: 24px 0 60px rgba(0, 0, 0, 0.52), 0 0 26px rgba(0, 255, 157, 0.10);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: none;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    body.light-mode .sidebar {
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 24px 0 60px rgba(15, 23, 42, 0.16), 0 0 30px rgba(0, 142, 179, 0.10);
    }

    body.light-mode .sidebar-backdrop {
      background: rgba(15, 23, 42, 0.28);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--glass-border);
    }

    .sidebar-head h2 {
      margin: 0;
      color: var(--neon-green);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 255, 157, 0.22);
    }

    .sidebar-close {
      width: 42px;
      height: 42px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 25px;
      line-height: 1;
      transition: all 0.2s;
    }

    .sidebar-close:hover {
      border-color: var(--neon-red);
      background: var(--neon-red);
      color: #fff;
      box-shadow: 0 0 18px rgba(255, 0, 85, 0.42);
    }

    .sidebar-actions {
      display: grid;
      gap: 12px;
    }

    .sidebar-action {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(0, 255, 157, 0.035);
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.86rem;
      font-weight: 850;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .sidebar-action svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      color: var(--neon-green);
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.30));
    }

    .sidebar-action:hover {
      border-color: rgba(0, 245, 212, 0.40);
      background: rgba(0, 255, 157, 0.08);
      color: var(--neon-green);
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.15);
      transform: translateX(2px);
    }

    .sidebar-action.primary-action {
      border-color: rgba(0, 255, 157, 0.34);
      color: var(--neon-green);
    }

    .theme-action .moon-icon {
      display: none;
    }

    body.light-mode .theme-action .sun-icon {
      display: none;
    }

    body.light-mode .theme-action .moon-icon {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 30px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      min-height: 0;
      padding: 30px 22px 24px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      background: var(--glass-bg);
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      cursor: pointer;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 255, 157, 0.09), transparent 48%);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 0 1px rgba(0, 245, 212, 0.12), 0 14px 34px rgba(0, 0, 0, 0.38);
      border-color: rgba(0, 245, 212, 0.42);
      background: rgba(2, 18, 13, 0.94);
    }

    body.light-mode .card:hover {
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:active {
      transform: translateY(-1px);
    }

    .icon-wrap {
      width: 57px;
      height: 57px;
      margin: 6px auto 20px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 16px rgba(0, 255, 157, 0.07), 0 0 16px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .icon-wrap img {
      width: 45px;
      height: 45px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
    }

    .fallback-icon {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(0, 255, 157, 0.92), rgba(0, 245, 212, 0.82));
      color: #000;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.22);
    }

    .name {
      margin: 0 0 8px;
      max-width: 100%;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .domain {
      margin: 0;
      max-width: 100%;
      color: var(--text-muted);
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 34px;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 2;
      gap: 4px;
      grid-template-rows: repeat(3, 4px);
      transition: all 0.2s;
    }

    .menu-btn:hover {
      color: var(--neon-green);
      border-color: rgba(0, 255, 157, 0.28);
      background: rgba(0, 255, 157, 0.06);
      box-shadow: 0 0 14px rgba(0, 255, 157, 0.16);
      transform: none;
    }

    .menu-btn span,
    .menu-btn::before,
    .menu-btn::after {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    .card-menu {
      position: absolute;
      top: 56px;
      right: 18px;
      width: 150px;
      padding: 8px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--glass-bg-strong);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      z-index: 5;
      display: none;
      text-align: left;
    }

    body.light-mode .card-menu {
      background: rgba(255, 255, 255, 0.96);
    }

    .card-menu.open {
      display: block;
    }

    .card-menu button {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .card-menu button:hover {
      border-color: rgba(0, 255, 157, 0.24);
      background: rgba(0, 255, 157, 0.07);
      color: var(--neon-green);
      box-shadow: none;
      transform: none;
    }

    .card-menu .danger {
      color: var(--danger);
    }

    .card-menu .danger:hover {
      border-color: rgba(255, 0, 85, 0.28);
      background: rgba(255, 0, 85, 0.08);
      color: var(--neon-red);
    }

    .empty {
      grid-column: 1 / -1;
      padding: 70px 20px;
      border: 1px dashed var(--glass-border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--text-muted);
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .empty h2 {
      margin: 0 0 8px;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      padding: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 50;
    }

    body.light-mode .modal-backdrop {
      background: rgba(15, 23, 42, 0.22);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      padding: 26px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg-strong);
      color: var(--text-primary);
      box-shadow: 0 0 0 1px rgba(0, 255, 157, 0.08), 0 35px 90px rgba(0, 0, 0, 0.52);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    body.light-mode .modal {
      background: var(--glass-bg-strong);
      box-shadow: 0 0 42px rgba(0, 142, 179, 0.10), 0 35px 90px rgba(15, 23, 42, 0.18);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 12px;
    }

    .modal h2 {
      margin: 0;
      color: var(--neon-green);
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 255, 157, 0.22);
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--input-bg);
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: var(--neon-red);
      border-color: var(--neon-red);
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.45);
      transform: scale(1.02);
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input {
      width: 100%;
      height: 54px;
      padding: 0 15px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      outline: 0;
      color: var(--neon-green);
      background: var(--input-bg);
      font-family: var(--font-display);
      font-size: 16px;
      transition: 0.3s;
    }

    input:focus {
      border-color: rgba(0, 255, 157, 0.50);
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.13);
      background: rgba(0, 12, 8, 0.86);
    }

    .hint {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      margin-top: -7px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 22px;
    }

    .secondary,
    .primary {
      height: 48px;
      padding: 0 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .secondary {
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-muted);
    }

    .secondary:hover {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: none;
      transform: scale(1.02);
    }

    .primary {
      border: 1px solid rgba(0, 255, 157, 0.32);
      background: rgba(0, 255, 157, 0.055);
      color: var(--neon-green);
    }

    .primary:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.42);
      transform: scale(1.02);
    }

    @media (max-width: 1320px) {
      .grid {
        grid-template-columns: repeat(5, minmax(150px, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(4, minmax(140px, 1fr));
      }

      .page {
        width: min(100% - 46px, 1740px);
      }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 28px, 1740px);
        padding: 24px 0 38px;
      }

      .topbar {
        gap: 10px;
        margin-bottom: 22px;
      }

      .sidebar-toggle {
        width: 58px;
        height: 68px;
        flex-basis: 58px;
        border-radius: 10px;
      }

      .burger-lines {
        width: 23px;
        gap: 5px;
      }

      .search-shell {
        height: 68px;
        padding: 0 18px;
        gap: 14px;
      }

      .search-shell svg {
        width: 25px;
        height: 25px;
      }

      #searchInput {
        font-size: 17px;
      }

      .kbd {
        display: none;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
        gap: 10px;
      }

      .card {
        aspect-ratio: 1 / 1;
        min-height: 104px;
        padding: 14px 8px 10px;
      }

      .icon-wrap {
        width: 38px;
        height: 38px;
        margin: 0 auto 8px;
      }

      .icon-wrap img,
      .fallback-icon {
        width: 30px;
        height: 30px;
        border-radius: 7px;
      }

      .fallback-icon {
        font-size: 17px;
      }

      .name {
        display: -webkit-box;
        margin-bottom: 0;
        font-size: 12px;
        line-height: 1.15;
        white-space: normal;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .domain {
        display: none;
      }

      .menu-btn {
        top: 6px;
        right: 6px;
        width: 26px;
        height: 26px;
        gap: 3px;
        grid-template-rows: repeat(3, 3px);
      }

      .menu-btn span,
      .menu-btn::before,
      .menu-btn::after {
        width: 3px;
        height: 3px;
      }

      .card-menu {
        top: 34px;
        right: 6px;
        width: 132px;
      }

      .sidebar {
        padding: 20px;
      }
    }

    @media (max-width: 420px) {
      .page {
        width: min(100% - 20px, 1740px);
      }

      .sidebar {
        width: min(296px, calc(100vw - 18px));
        padding: 18px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
        gap: 8px;
      }

      .card {
        min-height: 92px;
        padding: 12px 6px 8px;
      }

      .icon-wrap {
        width: 34px;
        height: 34px;
        margin-bottom: 7px;
      }

      .icon-wrap img,
      .fallback-icon {
        width: 28px;
        height: 28px;
      }

      .fallback-icon {
        font-size: 16px;
      }

      .name {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <aside class="sidebar" id="sidebar" aria-label="App controls" aria-hidden="true">
    <div class="sidebar-head">
      <h2>Menu</h2>
      <button class="sidebar-close" id="closeSidebar" type="button" aria-label="Close menu">&times;</button>
    </div>

    <div class="sidebar-actions">
      <button class="sidebar-action primary-action" id="addButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        <span>Add Link</span>
      </button>

      <button class="sidebar-action theme-action" id="themeButton" type="button" aria-pressed="false" aria-label="Switch to light theme">
        <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3.5"></circle>
          <path d="M12 3.5v2"></path>
          <path d="M12 18.5v2"></path>
          <path d="M3.5 12h2"></path>
          <path d="M18.5 12h2"></path>
          <path d="m6.1 6.1 1.4 1.4"></path>
          <path d="m16.5 16.5 1.4 1.4"></path>
          <path d="m17.9 6.1-1.4 1.4"></path>
          <path d="m7.5 16.5-1.4 1.4"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 14.6A7.5 7.5 0 0 1 9.4 4a8.5 8.5 0 1 0 10.6 10.6Z"></path>
        </svg>
        <span id="themeButtonText">Light Theme</span>
      </button>

      <button class="sidebar-action" id="exportButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 16V4"></path>
          <path d="m7 9 5-5 5 5"></path>
          <path d="M5 20h14"></path>
        </svg>
        <span>Export</span>
      </button>

      <button class="sidebar-action" id="importButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 4v12"></path>
          <path d="m7 11 5 5 5-5"></path>
          <path d="M5 20h14"></path>
        </svg>
        <span>Import</span>
      </button>

      <button class="sidebar-action" id="resetButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4.5 12a7.5 7.5 0 1 0 2.2-5.3"></path>
          <path d="M4.5 5.5v5h5"></path>
        </svg>
        <span>Reset</span>
      </button>

      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </aside>

  <main class="page">
    <section class="topbar">
      <button class="sidebar-toggle" id="openSidebar" type="button" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
        <span class="burger-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <div class="search-shell">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.75 18.5a7.75 7.75 0 1 1 0-15.5 7.75 7.75 0 0 1 0 15.5Z" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
          <path d="m16.6 16.6 4.4 4.4" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Search for apps, websites, bookmarks..." autocomplete="off" />
        <div class="kbd"><span id="modKey">Ctrl</span><span>K</span></div>
      </div>
    </section>

    <section class="grid" id="grid"></section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="bookmarkForm">
      <div class="modal-head">
        <h2 id="modalTitle">Add Link</h2>
        <button type="button" class="close-btn" id="closeModal" aria-label="Close">&times;</button>
      </div>

      <div class="form-grid">
        <label>
          App name
          <input id="nameInput" required maxlength="40" placeholder="ChatGPT" />
        </label>

        <label>
          Link URL
          <input id="urlInput" required placeholder="https://chat.openai.com" />
        </label>

        <label>
          Icon URL
          <input id="iconInput" placeholder="Optional. Leave empty to auto-detect favicon." />
        </label>
        <div class="hint">Tip: paste a direct image URL for a custom icon, or leave empty.</div>
      </div>

      <div class="actions">
        <button type="button" class="secondary" id="cancelButton">Cancel</button>
        <button type="submit" class="primary">Apply and Save</button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = "personal_bookmark_app_store_v1";
    const THEME_KEY = "personal_bookmark_theme_v2";

    const defaults = [
      { name: "Google", url: "https://google.com" },
      { name: "YouTube", url: "https://youtube.com" },
      { name: "Gmail", url: "https://mail.google.com" },
      { name: "Notion", url: "https://notion.so" },
      { name: "Slack", url: "https://slack.com" },
      { name: "Figma", url: "https://figma.com" },
      { name: "GitHub", url: "https://github.com" },
      { name: "Linear", url: "https://linear.app" },
      { name: "Trello", url: "https://trello.com" },
      { name: "Dropbox", url: "https://dropbox.com" },
      { name: "Calendar", url: "https://calendar.google.com" },
      { name: "Drive", url: "https://drive.google.com" },
      { name: "X (Twitter)", url: "https://x.com" },
      { name: "LinkedIn", url: "https://linkedin.com" },
      { name: "ChatGPT", url: "https://chat.openai.com" },
      { name: "Medium", url: "https://medium.com" },
      { name: "Stripe", url: "https://stripe.com" },
      { name: "AWS Console", url: "https://console.aws.amazon.com" }
    ];

    let bookmarks = [];
    let editingId = null;

    const grid = document.getElementById("grid");
    const searchInput = document.getElementById("searchInput");
    const openSidebar = document.getElementById("openSidebar");
    const closeSidebar = document.getElementById("closeSidebar");
    const sidebar = document.getElementById("sidebar");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    const addButton = document.getElementById("addButton");
    const themeButton = document.getElementById("themeButton");
    const themeButtonText = document.getElementById("themeButtonText");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const bookmarkForm = document.getElementById("bookmarkForm");
    const modalTitle = document.getElementById("modalTitle");
    const nameInput = document.getElementById("nameInput");
    const urlInput = document.getElementById("urlInput");
    const iconInput = document.getElementById("iconInput");
    const closeModal = document.getElementById("closeModal");
    const cancelButton = document.getElementById("cancelButton");
    const exportButton = document.getElementById("exportButton");
    const importButton = document.getElementById("importButton");
    const importFile = document.getElementById("importFile");
    const resetButton = document.getElementById("resetButton");
    const modKey = document.getElementById("modKey");

    modKey.textContent = navigator.platform.toLowerCase().includes("mac") ? "Cmd" : "Ctrl";

    function applyTheme(theme) {
      const isBright = theme === "bright";
      document.body.classList.toggle("light-mode", isBright);
      themeButton.setAttribute("aria-pressed", String(isBright));
      themeButton.setAttribute("aria-label", isBright ? "Switch to terminal theme" : "Switch to light theme");
      themeButtonText.textContent = isBright ? "Terminal Theme" : "Light Theme";
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY);
      applyTheme(savedTheme === "bright" ? "bright" : "terminal");
    }

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function normalizeUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getHostname(url) {
      try {
        return new URL(normalizeUrl(url)).hostname.replace(/^www\./, "");
      } catch {
        return url;
      }
    }

    function faviconUrl(url) {
      const domain = getHostname(url);
      return "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(domain) + "&sz=128";
    }

    function initials(name) {
      return String(name || "?")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(word => word[0])
        .join("")
        .toUpperCase();
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length) {
          bookmarks = saved;
          return;
        }
      } catch {}
      bookmarks = defaults.map(item => ({ id: uid(), icon: "", ...item }));
      save();
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function setSidebar(open) {
      sidebar.classList.toggle("open", open);
      sidebarBackdrop.classList.toggle("open", open);
      sidebar.style.left = open ? "0" : "-360px";
      sidebar.setAttribute("aria-hidden", String(!open));
      openSidebar.setAttribute("aria-expanded", String(open));
    }

    function openSidebarNow() {
      closeMenus();
      setSidebar(true);
    }

    function closeSidebarNow() {
      setSidebar(false);
    }

    function closeMenus() {
      document.querySelectorAll(".card-menu.open").forEach(menu => menu.classList.remove("open"));
    }

    function render() {
      closeMenus();
      const query = searchInput.value.trim().toLowerCase();
      const items = bookmarks.filter(item => {
        const haystack = [item.name, item.url, getHostname(item.url)].join(" ").toLowerCase();
        return haystack.includes(query);
      });

      grid.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "<h2>No bookmarks found</h2><p>Add a new link or change the search.</p>";
        grid.appendChild(empty);
        return;
      }

      for (const item of items) {
        const card = document.createElement("article");
        card.className = "card";
        card.tabIndex = 0;
        card.setAttribute("role", "link");
        card.setAttribute("aria-label", "Open " + item.name);

        const menuButton = document.createElement("button");
        menuButton.className = "menu-btn";
        menuButton.type = "button";
        menuButton.setAttribute("aria-label", "Options for " + item.name);
        menuButton.innerHTML = "<span></span>";

        const menu = document.createElement("div");
        menu.className = "card-menu";
        menu.innerHTML = `
          <button type="button" data-action="edit">Edit</button>
          <button type="button" class="danger" data-action="delete">Delete</button>
        `;

        const iconWrap = document.createElement("div");
        iconWrap.className = "icon-wrap";

        const img = document.createElement("img");
        img.alt = "";
        img.src = item.icon ? item.icon : faviconUrl(item.url);
        img.referrerPolicy = "no-referrer";
        img.onerror = () => {
          iconWrap.innerHTML = `<div class="fallback-icon">${initials(item.name)}</div>`;
        };
        iconWrap.appendChild(img);

        const name = document.createElement("h3");
        name.className = "name";
        name.textContent = item.name;

        const domain = document.createElement("p");
        domain.className = "domain";
        domain.textContent = getHostname(item.url);

        card.append(menuButton, menu, iconWrap, name, domain);

        card.addEventListener("click", event => {
          if (event.target.closest("button") || event.target.closest(".card-menu")) return;
          window.open(normalizeUrl(item.url), "_blank", "noopener,noreferrer");
        });

        card.addEventListener("keydown", event => {
          if (event.key === "Enter") window.open(normalizeUrl(item.url), "_blank", "noopener,noreferrer");
        });

        menuButton.addEventListener("click", event => {
          event.stopPropagation();
          const wasOpen = menu.classList.contains("open");
          closeMenus();
          if (!wasOpen) menu.classList.add("open");
        });

        menu.addEventListener("click", event => {
          event.stopPropagation();
          const action = event.target.dataset.action;
          if (action === "edit") openModal(item);
          if (action === "delete") deleteBookmark(item.id);
        });

        grid.appendChild(card);
      }
    }

    function openModal(item = null) {
      closeMenus();
      editingId = item ? item.id : null;
      modalTitle.textContent = item ? "Edit Link" : "Add Link";
      nameInput.value = item ? item.name : "";
      urlInput.value = item ? item.url : "";
      iconInput.value = item ? item.icon || "" : "";
      modalBackdrop.classList.add("open");
      setTimeout(() => nameInput.focus(), 0);
    }

    function closeModalNow() {
      modalBackdrop.classList.remove("open");
      bookmarkForm.reset();
      editingId = null;
    }

    function deleteBookmark(id) {
      const item = bookmarks.find(bookmark => bookmark.id === id);
      if (!item) return;
      if (!confirm(`Delete "${item.name}"?`)) return;
      bookmarks = bookmarks.filter(bookmark => bookmark.id !== id);
      save();
      render();
    }

    bookmarkForm.addEventListener("submit", event => {
      event.preventDefault();

      const data = {
        name: nameInput.value.trim(),
        url: normalizeUrl(urlInput.value),
        icon: iconInput.value.trim()
      };

      if (!data.name || !data.url) return;

      if (editingId) {
        bookmarks = bookmarks.map(item => item.id === editingId ? { ...item, ...data } : item);
      } else {
        bookmarks.unshift({ id: uid(), ...data });
      }

      save();
      closeModalNow();
      render();
    });

    searchInput.addEventListener("input", render);
    openSidebar.addEventListener("click", openSidebarNow);
    closeSidebar.addEventListener("click", closeSidebarNow);
    sidebarBackdrop.addEventListener("click", closeSidebarNow);
    addButton.addEventListener("click", () => {
      closeSidebarNow();
      openModal();
    });
    themeButton.addEventListener("click", () => {
      const nextTheme = document.body.classList.contains("light-mode") ? "terminal" : "bright";
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
      closeSidebarNow();
    });
    closeModal.addEventListener("click", closeModalNow);
    cancelButton.addEventListener("click", closeModalNow);

    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) closeModalNow();
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".card-menu") && !event.target.closest(".menu-btn")) closeMenus();
    });

    document.addEventListener("keydown", event => {
      const cmdK = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k";
      if (cmdK) {
        event.preventDefault();
        searchInput.focus();
      }
      if (event.key === "Escape") {
        closeMenus();
        if (sidebar.classList.contains("open")) closeSidebarNow();
        if (modalBackdrop.classList.contains("open")) closeModalNow();
      }
    });

    exportButton.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(bookmarks, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "bookmarks.json";
      a.click();
      URL.revokeObjectURL(a.href);
      closeSidebarNow();
    });

    importButton.addEventListener("click", () => {
      importFile.click();
      closeSidebarNow();
    });

    importFile.addEventListener("change", async () => {
      const file = importFile.files[0];
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!Array.isArray(imported)) throw new Error("Invalid file");
        bookmarks = imported
          .filter(item => item && item.name && item.url)
          .map(item => ({
            id: item.id || uid(),
            name: String(item.name).trim(),
            url: normalizeUrl(item.url),
            icon: String(item.icon || "").trim()
          }));
        save();
        render();
      } catch {
        alert("Could not import this JSON file.");
      } finally {
        importFile.value = "";
      }
    });

    resetButton.addEventListener("click", () => {
      if (!confirm("Reset all bookmarks to the default list?")) return;
      localStorage.removeItem(STORAGE_KEY);
      load();
      render();
      closeSidebarNow();
    });

    loadTheme();
    load();
    render();
  </script>
</body>
</html>
