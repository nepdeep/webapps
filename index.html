<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Terminal Neon Palette */
      --bg-dark: #020403;
      --glass-bg: rgba(3, 14, 11, 0.88);
      --glass-bg-strong: rgba(1, 8, 6, 0.97);
      --glass-border: rgba(0, 255, 157, 0.18);
      --neon-green: #00ff9d;
      --neon-red: #ff3366;
      --neon-blue: #00f5d4;
      --neon-yellow: #d7ff6a;
      --neon-purple: #8c5cff;
      --text-primary: #e8fff5;
      --text-muted: #72a993;
      --input-bg: rgba(0, 12, 8, 0.72);
      --font-display: 'JetBrains Mono', monospace;
      --font-body: 'JetBrains Mono', monospace;

      /* Existing app variable aliases */
      --bg: var(--bg-dark);
      --card: var(--glass-bg);
      --card-strong: var(--glass-bg-strong);
      --text: var(--text-primary);
      --muted: var(--text-muted);
      --line: var(--glass-border);
      --accent: var(--neon-blue);
      --danger: var(--neon-red);
      --radius: 8px;
      --blur: blur(8px);
      --shadow: 0 0 0 1px rgba(0, 255, 157, 0.08), 0 16px 40px rgba(0, 0, 0, 0.44);
      --shadow-soft: 0 0 0 1px rgba(0, 255, 157, 0.04), 0 10px 28px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text-primary);
      background-color: var(--bg-dark);
      background-image:
        linear-gradient(180deg, rgba(0, 255, 157, 0.045), transparent 36%),
        linear-gradient(90deg, rgba(0, 245, 212, 0.04), transparent 45%);
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(rgba(0, 255, 157, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 157, 0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
    }

    body.light-mode {
      --bg-dark: #eef2f6;
      --glass-bg: rgba(255, 255, 255, 0.76);
      --glass-bg-strong: rgba(255, 255, 255, 0.96);
      --glass-border: rgba(0, 0, 0, 0.10);
      --neon-blue: #008eb3;
      --neon-green: #00a86b;
      --neon-red: #d60047;
      --neon-yellow: #b8a500;
      --neon-purple: #9000c4;
      --text-primary: #1a202c;
      --text-muted: #586878;
      --input-bg: rgba(255, 255, 255, 0.80);
      --shadow: 0 0 30px rgba(0, 142, 179, 0.12), 0 8px 32px rgba(15, 23, 42, 0.10);
      --shadow-soft: 0 8px 32px rgba(15, 23, 42, 0.08);
      color-scheme: light;
      background-image:
        linear-gradient(180deg, rgba(0, 142, 179, 0.08), transparent 38%),
        linear-gradient(90deg, rgba(0, 168, 107, 0.06), transparent 48%);
    }

    body.light-mode::before {
      background:
        linear-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px);
    }

    button,
    input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    .card:focus-visible {
      outline: 2px solid var(--neon-blue);
      outline-offset: 3px;
    }

    .page {
      width: min(1740px, calc(100% - 80px));
      margin: 0 auto;
      padding: 76px 0 70px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 46px;
    }

    .sidebar-toggle {
      width: 92px;
      height: 92px;
      flex: 0 0 92px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(0, 255, 157, 0.32);
      border-radius: 8px;
      color: var(--neon-green);
      background: rgba(0, 255, 157, 0.045);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: all 0.2s;
    }

    .sidebar-toggle:hover {
      transform: scale(1.02) translateY(-2px);
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.42);
    }

    .burger-lines {
      width: 28px;
      display: grid;
      gap: 6px;
    }

    .burger-lines span {
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 10px rgba(0, 255, 157, 0.42);
    }

    .search-shell {
      flex: 1;
      height: 92px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      position: relative;
      overflow: hidden;
    }

    .search-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .search-shell:focus-within {
      border-color: rgba(0, 245, 212, 0.52);
      box-shadow: 0 0 0 1px rgba(0, 245, 212, 0.16), 0 0 22px rgba(0, 255, 157, 0.12), var(--shadow-soft);
    }

    .search-shell svg {
      width: 34px;
      height: 34px;
      color: var(--neon-green);
      flex: 0 0 auto;
      filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.35));
    }

    #searchInput {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text-primary);
      font-size: 18px;
      letter-spacing: 0;
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--neon-green);
      background: var(--input-bg);
      font-family: var(--font-display);
      font-size: 17px;
      line-height: 1;
      user-select: none;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.52);
      opacity: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.2s ease;
    }

    .sidebar-backdrop.open {
      pointer-events: auto;
      opacity: 1;
    }

    .sidebar {
      position: fixed;
      top: 0;
      right: auto;
      bottom: 0;
      left: -360px;
      z-index: 41;
      width: min(330px, calc(100vw - 28px));
      padding: 24px;
      border-right: 1px solid rgba(0, 255, 157, 0.26);
      background: var(--glass-bg-strong);
      box-shadow: 24px 0 60px rgba(0, 0, 0, 0.52), 0 0 26px rgba(0, 255, 157, 0.10);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: none;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    body.light-mode .sidebar {
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 24px 0 60px rgba(15, 23, 42, 0.16), 0 0 30px rgba(0, 142, 179, 0.10);
    }

    body.light-mode .sidebar-backdrop {
      background: rgba(15, 23, 42, 0.28);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--glass-border);
    }

    .sidebar-head h2 {
      margin: 0;
      color: var(--neon-green);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 255, 157, 0.22);
    }

    .sidebar-close {
      width: 42px;
      height: 42px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 25px;
      line-height: 1;
      transition: all 0.2s;
    }

    .sidebar-close:hover {
      border-color: var(--neon-red);
      background: var(--neon-red);
      color: #fff;
      box-shadow: 0 0 18px rgba(255, 0, 85, 0.42);
    }

    .sidebar-actions {
      display: grid;
      gap: 12px;
    }

    .sidebar-action {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: rgba(0, 255, 157, 0.035);
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.86rem;
      font-weight: 850;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .sidebar-action svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      color: var(--neon-green);
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.30));
    }

    .sidebar-action:hover {
      border-color: rgba(0, 245, 212, 0.40);
      background: rgba(0, 255, 157, 0.08);
      color: var(--neon-green);
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.15);
      transform: translateX(2px);
    }

    .sidebar-action.primary-action {
      border-color: rgba(0, 255, 157, 0.34);
      color: var(--neon-green);
    }

    .theme-action .moon-icon {
      display: none;
    }

    body.light-mode .theme-action .sun-icon {
      display: none;
    }

    body.light-mode .theme-action .moon-icon {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 30px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      min-height: 0;
      padding: 30px 22px 24px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      background: var(--glass-bg);
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      cursor: pointer;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 255, 157, 0.09), transparent 48%);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 0 1px rgba(0, 245, 212, 0.12), 0 14px 34px rgba(0, 0, 0, 0.38);
      border-color: rgba(0, 245, 212, 0.42);
      background: rgba(2, 18, 13, 0.94);
    }

    body.light-mode .card:hover {
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card.drop-move-target {
      border-color: rgba(0, 255, 157, 0.86);
      background: rgba(0, 255, 157, 0.12);
      box-shadow: 0 0 0 1px rgba(0, 255, 157, 0.28), 0 0 24px rgba(0, 255, 157, 0.28), var(--shadow-soft);
      transform: translateY(-3px) scale(1.02);
    }

    .card.drop-merge-target {
      border-color: rgba(255, 51, 102, 0.92);
      background: rgba(255, 51, 102, 0.12);
      box-shadow: 0 0 0 1px rgba(255, 51, 102, 0.32), 0 0 28px rgba(255, 51, 102, 0.34), var(--shadow-soft);
      transform: scale(1.03);
    }

    .card.drop-move-target::before,
    .card.drop-merge-target::before {
      opacity: 1;
    }

    .card:active {
      transform: translateY(-1px);
    }

    .card.card-placeholder {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes cardDropSettle {
      0% { transform: scale(1.04); }
      55% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .card.card-drop-settle {
      animation: cardDropSettle 0.22s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      .card.card-drop-settle {
        animation: none;
      }
    }

    .drag-ghost {
      position: fixed !important;
      margin: 0 !important;
      z-index: 999;
      pointer-events: none !important;
      cursor: grabbing;
      will-change: transform;
      transition: none !important;
    }

    .drag-ghost .menu-btn,
    .drag-ghost .card-menu {
      display: none !important;
    }

    .icon-wrap {
      width: 57px;
      height: 57px;
      margin: 6px auto 20px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 0 16px rgba(0, 255, 157, 0.07), 0 0 16px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .icon-wrap img {
      width: 45px;
      height: 45px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
      -webkit-user-drag: none;
      user-drag: none;
    }

    .fallback-icon {
      width: 45px;
      height: 45px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(0, 255, 157, 0.92), rgba(0, 245, 212, 0.82));
      color: #000;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 0 18px rgba(0, 255, 157, 0.22);
    }

    .folder-card .icon-wrap {
      background:
        linear-gradient(135deg, rgba(0, 255, 157, 0.12), rgba(140, 92, 255, 0.11)),
        var(--input-bg);
      border-color: rgba(0, 245, 212, 0.30);
    }

    .folder-preview {
      width: 45px;
      height: 45px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 3px;
      padding: 3px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(0, 255, 157, 0.16);
    }

    .folder-mini {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      border-radius: 5px;
      overflow: hidden;
      background: rgba(0, 255, 157, 0.08);
      border: 1px solid rgba(0, 255, 157, 0.10);
    }

    .folder-mini.empty {
      opacity: 0.36;
    }

    .folder-mini img,
    .folder-mini .fallback-icon {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      box-shadow: none;
      filter: none;
    }

    .folder-mini img {
      padding: 2px;
      object-fit: contain;
    }

    .folder-mini .fallback-icon {
      font-size: 9px;
    }

    .name {
      margin: 0 0 8px;
      max-width: 100%;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .domain {
      margin: 0;
      max-width: 100%;
      color: var(--text-muted);
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 34px;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 2;
      gap: 4px;
      grid-template-rows: repeat(3, 4px);
      transition: all 0.2s;
    }

    .menu-btn:hover {
      color: var(--neon-green);
      border-color: rgba(0, 255, 157, 0.28);
      background: rgba(0, 255, 157, 0.06);
      box-shadow: 0 0 14px rgba(0, 255, 157, 0.16);
      transform: none;
    }

    .menu-btn span,
    .menu-btn::before,
    .menu-btn::after {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    .card-menu {
      position: absolute;
      top: 56px;
      right: 18px;
      width: 150px;
      padding: 8px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--glass-bg-strong);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      z-index: 5;
      display: none;
      text-align: left;
    }

    body.light-mode .card-menu {
      background: rgba(255, 255, 255, 0.96);
    }

    .card-menu.open {
      display: block;
    }

    .card-menu button {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .card-menu button:hover {
      border-color: rgba(0, 255, 157, 0.24);
      background: rgba(0, 255, 157, 0.07);
      color: var(--neon-green);
      box-shadow: none;
      transform: none;
    }

    .card-menu .danger {
      color: var(--danger);
    }

    .card-menu .danger:hover {
      border-color: rgba(255, 0, 85, 0.28);
      background: rgba(255, 0, 85, 0.08);
      color: var(--neon-red);
    }

    .empty {
      grid-column: 1 / -1;
      padding: 70px 20px;
      border: 1px dashed var(--glass-border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--text-muted);
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .empty h2 {
      margin: 0 0 8px;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0;
    }

    .folder-layer {
      position: fixed;
      inset: 0;
      z-index: 45;
      display: none;
      overflow: auto;
      padding: 1px 0 70px;
      background:
        linear-gradient(180deg, rgba(0, 255, 157, 0.08), transparent 42%),
        rgba(0, 0, 0, 0.70);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    body.light-mode .folder-layer {
      background:
        linear-gradient(180deg, rgba(0, 142, 179, 0.10), transparent 42%),
        rgba(238, 242, 246, 0.82);
    }

    .folder-layer.open {
      display: block;
    }

    .folder-shell {
      width: min(980px, calc(100% - 52px));
      margin: 58px auto 0;
    }

    .folder-head {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 26px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--glass-border);
    }

    .folder-head h2 {
      margin: 0 0 6px;
      color: var(--neon-green);
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(0, 255, 157, 0.22);
    }

    .folder-head p {
      margin: 0;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .folder-close {
      width: 56px;
      height: 56px;
      flex: 0 0 56px;
      display: grid;
      place-items: center;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--neon-green);
      background: var(--input-bg);
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: all 0.2s;
    }

    .folder-close:hover {
      border-color: rgba(255, 51, 102, 0.68);
      background: rgba(255, 51, 102, 0.18);
      color: var(--neon-red);
      box-shadow: 0 0 20px rgba(255, 51, 102, 0.28);
      transform: scale(1.02);
    }

    .folder-close svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
    }

    .folder-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
    }

    .folder-grid .card {
      aspect-ratio: auto;
      min-height: 164px;
      padding: 20px 14px 16px;
      justify-content: flex-start;
    }

    .folder-grid .icon-wrap {
      width: 66px;
      height: 66px;
      margin: 4px auto 14px;
      flex: 0 0 auto;
    }

    .folder-grid .icon-wrap img,

  </style>
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <aside class="sidebar" id="sidebar" aria-label="App controls" aria-hidden="true">
    <div class="sidebar-head">

          <circle cx="12" cy="12" r="3.5"></circle>

          <path d="M12 18.5v2"></path>
          <path d="M3.5 12h2"></path>

          <path d="m16.5 16.5 1.4 1.4"></path>

          <path d="m7.5 16.5-1.4 1.4"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 14.6A7.5 7.5 0 0 1 9.4 4a8.5 8.5 0 1 0 10.6 10.6Z"></path>
        </svg>

      <button class="sidebar-action" id="exportButton" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">

      <input id="importFile" type="file" accept="application/json" hidden />

  <main class="page">
    <section class="topbar">
      <button class="sidebar-toggle" id="openSidebar" type="button" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">

      <div class="search-shell">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.75 18.5a7.75 7.75 0 1 1 0-15.5 7.75 7.75 0 0 1 0 15.5Z" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
          <path d="m16.6 16.6 4.4 4.4" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Search for apps, websites, bookmarks..." autocomplete="off" />

  <section class="folder-layer" id="folderLayer" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="folderTitle">

      <div class="folder-head">
        <button class="folder-close" id="folderClose" type="button" aria-label="Close folder">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
        <div>
          <h2 id="folderTitle">Folder</h2>
          <p id="folderMeta">0 items</p>
        </div>
      </div>
      <section class="grid folder-grid" id="folderGrid"></section>
    </div>
  </section>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="bookmarkForm">
      <div class="modal-head">
        <h2 id="modalTitle">Add Link</h2>
        <button type="button" class="close-btn" id="closeModal" aria-label="Close">&times;</button>
      </div>

      <div class="form-grid">
        <label>
          App name
          <input id="nameInput" required maxlength="40" placeholder="ChatGPT" />
        </label>

        <label>
          Link URL
          <input id="urlInput" required placeholder="https://chat.openai.com" />
        </label>

        <label>
          Icon URL
          <input id="iconInput" placeholder="Optional. Leave empty to auto-detect favicon." />
        </label>
        <div class="hint">Tip: paste a direct image URL for a custom icon, or leave empty.</div>
      </div>

      <div class="actions">
        <button type="button" class="secondary" id="cancelButton">Cancel</button>
        <button type="submit" class="primary">Apply and Save</button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = "personal_bookmark_app_store_v1";
    const THEME_KEY = "personal_bookmark_theme_v2";

    const defaults = [
      { name: "Google", url: "https://google.com" },
      { name: "YouTube", url: "https://youtube.com" },
      { name: "Gmail", url: "https://mail.google.com" },
      { name: "Notion", url: "https://notion.so" },
      { name: "Slack", url: "https://slack.com" },
      { name: "Figma", url: "https://figma.com" },
      { name: "GitHub", url: "https://github.com" },
      { name: "Linear", url: "https://linear.app" },
      { name: "Trello", url: "https://trello.com" },
      { name: "Dropbox", url: "https://dropbox.com" },
      { name: "Calendar", url: "https://calendar.google.com" },
      { name: "Drive", url: "https://drive.google.com" },
      { name: "X (Twitter)", url: "https://x.com" },
      { name: "LinkedIn", url: "https://linkedin.com" },
      { name: "ChatGPT", url: "https://chat.openai.com" },
      { name: "Medium", url: "https://medium.com" },
      { name: "Stripe", url: "https://stripe.com" },
      { name: "AWS Console", url: "https://console.aws.amazon.com" }
    ];

    let bookmarks = [];
    let editingId = null;
    let isDragClick = false;
    let dragPending = null;
    let dragActive = null;
    let activeFolderId = null;

    const DRAG_MOUSE_THRESHOLD = 4;
    const DRAG_TOUCH_HOLD_MS = 260;
    const DRAG_TOUCH_TOLERANCE = 10;
    const DRAG_MERGE_RADIUS_RATIO = 0.34;
    const FOLDER_RENAME_HOLD_MS = 650;
    const FOLDER_RENAME_TOLERANCE = 8;

    const grid = document.getElementById("grid");
    const folderLayer = document.getElementById("folderLayer");
    const folderGrid = document.getElementById("folderGrid");
    const folderTitle = document.getElementById("folderTitle");
    const folderMeta = document.getElementById("folderMeta");
    const folderClose = document.getElementById("folderClose");
    const searchInput = document.getElementById("searchInput");
    const openSidebar = document.getElementById("openSidebar");
    const closeSidebar = document.getElementById("closeSidebar");
    const sidebar = document.getElementById("sidebar");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");
    const addButton = document.getElementById("addButton");
    const themeButton = document.getElementById("themeButton");
    const themeButtonText = document.getElementById("themeButtonText");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const bookmarkForm = document.getElementById("bookmarkForm");
    const modalTitle = document.getElementById("modalTitle");
    const nameInput = document.getElementById("nameInput");
    const urlInput = document.getElementById("urlInput");
    const iconInput = document.getElementById("iconInput");
    const closeModal = document.getElementById("closeModal");
    const cancelButton = document.getElementById("cancelButton");
    const exportButton = document.getElementById("exportButton");
    const importButton = document.getElementById("importButton");
    const importFile = document.getElementById("importFile");
    const resetButton = document.getElementById("resetButton");
    const modKey = document.getElementById("modKey");

    modKey.textContent = navigator.platform.toLowerCase().includes("mac") ? "Cmd" : "Ctrl";

    function applyTheme(theme) {
      const isBright = theme === "bright";
      document.body.classList.toggle("light-mode", isBright);
      themeButton.setAttribute("aria-pressed", String(isBright));
      themeButton.setAttribute("aria-label", isBright ? "Switch to terminal theme" : "Switch to light theme");
      themeButtonText.textContent = isBright ? "Terminal Theme" : "Light Theme";
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY);
      applyTheme(savedTheme === "bright" ? "bright" : "terminal");
    }

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function normalizeUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function getHostname(url) {
      try {
        return new URL(normalizeUrl(url)).hostname.replace(/^www\./, "");
      } catch {
        return url;
      }
    }

    function faviconUrl(url) {
      const domain = getHostname(url);
      return "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(domain) + "&sz=128";
    }

    function initials(name) {
      return String(name || "?")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(word => word[0])
        .join("")
        .toUpperCase();
    }

    function isFolder(item) {
      return Boolean(item && item.type === "folder" && Array.isArray(item.children));
    }

    function itemCountLabel(count) {
      return count + " " + (count === 1 ? "item" : "items");
    }

    function normalizeStoredItem(item) {
      if (!item || typeof item !== "object") return null;

      if (item.type === "folder" || Array.isArray(item.children)) {
        const children = Array.isArray(item.children)
          ? item.children.map(normalizeStoredItem).filter(Boolean)
          : [];

        return {
          id: item.id || uid(),
          type: "folder",
          name: String(item.name || "Folder").trim().slice(0, 40) || "Folder",
          children
        };
      }

      if (!item.name || !item.url) return null;

      return {
        id: item.id || uid(),
        name: String(item.name).trim().slice(0, 40),
        url: normalizeUrl(item.url),
        icon: String(item.icon || "").trim()
      };
    }

    function itemSearchText(item) {
      if (isFolder(item)) {
        return [item.name, ...item.children.map(itemSearchText)].join(" ").toLowerCase();
      }

      return [item.name, item.url, getHostname(item.url)].join(" ").toLowerCase();
    }

    function findItemById(id, collection = bookmarks, parentFolder = null) {
      for (let index = 0; index < collection.length; index++) {
        const item = collection[index];
        if (item.id === id) return { item, collection, index, parentFolder };

        if (isFolder(item)) {
          const match = findItemById(id, item.children, item);
          if (match) return match;
        }
      }

      return null;
    }

    function renderAll() {
      render();
      renderFolderLayer();
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length) {
          bookmarks = saved.map(normalizeStoredItem).filter(Boolean);
          if (bookmarks.length) {
            save();
            return;
          }
        }
      } catch {}
      bookmarks = defaults.map(item => ({ id: uid(), icon: "", ...item }));
      save();
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function setSidebar(open) {
      sidebar.classList.toggle("open", open);
      sidebarBackdrop.classList.toggle("open", open);
      sidebar.style.left = open ? "0" : "-360px";
      sidebar.setAttribute("aria-hidden", String(!open));
      openSidebar.setAttribute("aria-expanded", String(open));
    }

    function openSidebarNow() {
      closeMenus();
      setSidebar(true);
    }

    function closeSidebarNow() {
      setSidebar(false);
    }

    function closeMenus() {
      document.querySelectorAll(".card-menu.open").forEach(menu => menu.classList.remove("open"));
    }

    function render() {
      closeMenus();
      const query = searchInput.value.trim().toLowerCase();
      const items = bookmarks.filter(item => itemSearchText(item).includes(query));
      renderCollection(grid, items, {
        grid,
        collection: bookmarks,
        allowMerge: !query,
        isRoot: true
      });
    }

    function renderFolderLayer() {
      if (!activeFolderId) return;

      const match = findItemById(activeFolderId);
      if (!match || !isFolder(match.item)) {
        closeFolderLayer();
        return;
      }

      const folder = match.item;
      folderTitle.textContent = folder.name;
      folderMeta.textContent = itemCountLabel(folder.children.length);
      renderCollection(folderGrid, folder.children, {
        grid: folderGrid,
        collection: folder.children,
        allowMerge: false,
        isRoot: false,
        parentFolderId: folder.id
      });
    }

    function renderCollection(targetGrid, items, context) {
      targetGrid.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = targetGrid === folderGrid
          ? "<h2>Empty folder</h2><p>0 items</p>"
          : "<h2>No bookmarks found</h2><p>Add a new link or change the search.</p>";
        targetGrid.appendChild(empty);
        return;
      }

      for (const item of items) {
        targetGrid.appendChild(createCard(item, context));
      }
    }

    function createFallbackIcon(item) {
      const fallback = document.createElement("div");
      fallback.className = "fallback-icon";
      fallback.textContent = initials(item.name);
      return fallback;
    }

    function appendLinkIcon(iconWrap, item) {
      const img = document.createElement("img");
      img.alt = "";
      img.src = item.icon ? item.icon : faviconUrl(item.url);
      img.referrerPolicy = "no-referrer";
      img.draggable = false;
      img.onerror = () => {
        iconWrap.innerHTML = "";
        iconWrap.appendChild(createFallbackIcon(item));
      };
      iconWrap.appendChild(img);
    }

    function createFolderPreview(folder) {
      const preview = document.createElement("div");
      preview.className = "folder-preview";

      for (let i = 0; i < 4; i++) {
        const child = folder.children[i];
        const mini = document.createElement("div");
        mini.className = "folder-mini";

        if (child) {
          if (isFolder(child)) {
            mini.appendChild(createFallbackIcon(child));
          } else {
            const img = document.createElement("img");
            img.alt = "";
            img.src = child.icon ? child.icon : faviconUrl(child.url);
            img.referrerPolicy = "no-referrer";
            img.draggable = false;
            img.onerror = () => {
              mini.innerHTML = "";
              mini.appendChild(createFallbackIcon(child));
            };
            mini.appendChild(img);
          }
        } else {
          mini.classList.add("empty");
        }

        preview.appendChild(mini);
      }

      return preview;
    }

    function createCard(item, context) {
      const folder = isFolder(item);
      const card = document.createElement("article");
      card.className = folder ? "card folder-card" : "card";
      card.tabIndex = 0;
      card.dataset.id = item.id;
      card.dataset.type = folder ? "folder" : "link";
      card.setAttribute("role", folder ? "button" : "link");
      card.setAttribute("aria-label", (folder ? "Open folder " : "Open ") + item.name);

      const menuButton = document.createElement("button");
      menuButton.className = "menu-btn";
      menuButton.type = "button";
      menuButton.setAttribute("aria-label", "Options for " + item.name);
      menuButton.innerHTML = "<span></span>";

      const menu = document.createElement("div");
      menu.className = "card-menu";
      menu.innerHTML = folder
        ? `
          <button type="button" data-action="rename">Rename</button>
          <button type="button" class="danger" data-action="delete">Delete</button>
        `
        : `
          <button type="button" data-action="edit">Edit</button>
          <button type="button" class="danger" data-action="delete">Delete</button>
        `;

      const iconWrap = document.createElement("div");
      iconWrap.className = "icon-wrap";
      if (folder) {
        iconWrap.appendChild(createFolderPreview(item));
      } else {
        appendLinkIcon(iconWrap, item);
      }

      const name = document.createElement("h3");
      name.className = "name";
      name.textContent = item.name;

      const domain = document.createElement("p");
      domain.className = "domain";
      domain.textContent = folder ? itemCountLabel(item.children.length) : getHostname(item.url);

      card.append(menuButton, menu, iconWrap, name, domain);

      card.addEventListener("click", event => {
        if (isDragClick) { isDragClick = false; return; }
        if (event.target.closest("button") || event.target.closest(".card-menu")) return;
        if (folder) {
          openFolderLayer(item.id);
        } else {
          window.open(normalizeUrl(item.url), "_blank", "noopener,noreferrer");
        }
      });

      card.addEventListener("keydown", event => {
        if (event.key !== "Enter") return;
        if (folder) {
          openFolderLayer(item.id);
        } else {
          window.open(normalizeUrl(item.url), "_blank", "noopener,noreferrer");
        }
      });

      menuButton.addEventListener("click", event => {
        event.stopPropagation();
        const wasOpen = menu.classList.contains("open");
        closeMenus();
        if (!wasOpen) menu.classList.add("open");
      });

      menu.addEventListener("click", event => {
        event.stopPropagation();
        const action = event.target.dataset.action;
        if (action === "edit") openModal(item);
        if (action === "rename") renameFolder(item.id);
        if (action === "delete") deleteBookmark(item.id);
      });

      if (folder) initFolderRenameHold(card, item);
      initCardDrag(card, item, context);

      return card;
    }

    function openFolderLayer(id) {
      const match = findItemById(id);
      if (!match || !isFolder(match.item)) return;
      closeMenus();
      activeFolderId = id;
      folderLayer.classList.add("open");
      folderLayer.setAttribute("aria-hidden", "false");
      renderFolderLayer();
      setTimeout(() => folderClose.focus(), 0);
    }

    function closeFolderLayer() {
      activeFolderId = null;
      folderLayer.classList.remove("open");
      folderLayer.setAttribute("aria-hidden", "true");
      folderGrid.innerHTML = "";
    }

    function cancelPendingDragForCard(card) {
      if (!dragPending || dragPending.card !== card) return;
      cleanupPendingListeners(dragPending);
      if (dragPending.timer) clearTimeout(dragPending.timer);
      dragPending = null;
    }

    function initFolderRenameHold(card, item) {
      card.addEventListener("pointerdown", event => {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        if (event.target.closest(".menu-btn") || event.target.closest(".card-menu")) return;

        const startX = event.clientX;
        const startY = event.clientY;
        let timer = null;

        const cleanup = () => {
          if (timer) clearTimeout(timer);
          document.removeEventListener("pointermove", onMove);
          document.removeEventListener("pointerup", cleanup);
          document.removeEventListener("pointercancel", cleanup);
        };

        const onMove = moveEvent => {
          const dist = Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY);
          if (dist > FOLDER_RENAME_TOLERANCE) cleanup();
        };

        timer = setTimeout(() => {
          if (dragActive) return;
          cleanup();
          cancelPendingDragForCard(card);
          isDragClick = true;
          renameFolder(item.id);
          setTimeout(() => { isDragClick = false; }, 0);
        }, FOLDER_RENAME_HOLD_MS);

        document.addEventListener("pointermove", onMove);
        document.addEventListener("pointerup", cleanup);
        document.addEventListener("pointercancel", cleanup);
      });
    }

    // ============ Drag & drop reordering ============
    // Pointer Events unify mouse/touch/pen. Mouse arms a drag on a small
    // movement threshold (snappy, no ambiguity with scrolling). Touch arms
    // on a brief hold with minimal movement (so normal page scroll still
    // works) then takes over. A floating "ghost" clone follows the pointer
    // while the real card becomes an invisible placeholder that we shuffle
    // through the grid, so CSS Grid handles the reflow and a lightweight
    // FLIP pass animates the other icons sliding out of the way.

    function initCardDrag(card, item, context) {
      card.addEventListener("pointerdown", event => startPendingDrag(event, card, item, context));
    }

    function startPendingDrag(event, card, item, context) {
      if (dragPending || dragActive) return;
      if (event.pointerType === "mouse" && event.button !== 0) return;
      if (event.target.closest(".menu-btn") || event.target.closest(".card-menu")) return;
      if (searchInput.value.trim()) return;

      const pending = {
        pointerId: event.pointerId,
        card,
        item,
        startX: event.clientX,
        startY: event.clientY,
        pointerType: event.pointerType || "mouse",
        timer: null,
        context
      };

      pending.moveFn = moveEvent => onPendingMove(moveEvent, pending);
      pending.endFn = endEvent => onPendingEnd(endEvent, pending);

      document.addEventListener("pointermove", pending.moveFn);
      document.addEventListener("pointerup", pending.endFn);
      document.addEventListener("pointercancel", pending.endFn);

      if (pending.pointerType === "touch") {
        pending.timer = setTimeout(() => {
          if (dragPending === pending) armDrag(pending);
        }, DRAG_TOUCH_HOLD_MS);
      }

      dragPending = pending;
    }

    function onPendingMove(event, pending) {
      if (dragActive && dragActive.pointerId === pending.pointerId) {
        updateDrag(event.clientX, event.clientY);
        event.preventDefault();
        return;
      }

      if (dragPending !== pending) return;

      const dist = Math.hypot(event.clientX - pending.startX, event.clientY - pending.startY);

      if (pending.pointerType === "touch") {
        if (dist > DRAG_TOUCH_TOLERANCE) {
          if (pending.timer) clearTimeout(pending.timer);
          cleanupPendingListeners(pending);
          dragPending = null;
        }
      } else if (dist > DRAG_MOUSE_THRESHOLD) {
        armDrag(pending);
        updateDrag(event.clientX, event.clientY);
        event.preventDefault();
      }
    }

    function armDrag(pending) {
      if (pending.timer) clearTimeout(pending.timer);
      if (dragPending !== pending) return;
      dragPending = null;

      closeMenus();

      const rect = pending.card.getBoundingClientRect();
      const ghost = createGhost(pending.card, rect);

      pending.card.classList.add("card-placeholder");
      pending.card.setAttribute("aria-hidden", "true");
      pending.card.tabIndex = -1;
      pending.card.style.touchAction = "none";

      dragActive = {
        pointerId: pending.pointerId,
        card: pending.card,
        item: pending.item,
        context: pending.context,
        ghost,
        startX: pending.startX,
        startY: pending.startY,
        lastTargetEl: null,
        lastPlaceBefore: null,
        lastDropMode: null
      };

      if (navigator.vibrate) {
        try { navigator.vibrate(8); } catch {}
      }
    }

    function createGhost(sourceCard, rect) {
      const ghost = sourceCard.cloneNode(true);
      ghost.classList.add("drag-ghost");
      ghost.classList.remove("card-placeholder");
      ghost.setAttribute("aria-hidden", "true");
      ghost.tabIndex = -1;
      ghost.style.width = rect.width + "px";
      ghost.style.height = rect.height + "px";
      ghost.style.left = rect.left + "px";
      ghost.style.top = rect.top + "px";
      ghost.style.transform = "translate(0px, 0px) scale(1.05)";
      document.body.appendChild(ghost);
      return ghost;
    }

    function updateDrag(x, y) {
      if (!dragActive) return;

      const dx = x - dragActive.startX;
      const dy = y - dragActive.startY;
      const tilt = Math.max(-6, Math.min(6, dx * 0.04));
      dragActive.ghost.style.transform = `translate(${dx}px, ${dy}px) scale(1.05) rotate(${tilt}deg)`;

      const target = findDropTarget(x, y, dragActive.card, {
        element: dragActive.lastTargetEl,
        placeBefore: dragActive.lastPlaceBefore
      }, dragActive.context.grid, dragActive.context.allowMerge);
      if (!target.element) {
        clearDragHighlights();
        dragActive.lastTargetEl = null;
        dragActive.lastPlaceBefore = null;
        dragActive.lastDropMode = null;
        return;
      }
      const sameTarget = target.element === dragActive.lastTargetEl
        && target.placeBefore === dragActive.lastPlaceBefore
        && target.mode === dragActive.lastDropMode;
      if (sameTarget) return;

      clearDragHighlights();
      dragActive.lastTargetEl = target.element;
      dragActive.lastPlaceBefore = target.placeBefore;
      dragActive.lastDropMode = target.mode;
      dragActive.ghost.classList.add(target.mode === "merge" ? "drop-merge-target" : "drop-move-target");

      if (target.mode === "merge") return;

      flipReorder(() => {
        if (target.placeBefore) {
          dragActive.context.grid.insertBefore(dragActive.card, target.element);
        } else {
          dragActive.context.grid.insertBefore(dragActive.card, target.element.nextSibling);
        }
      }, dragActive.card, dragActive.context.grid);
    }

    // Current target gets a distance "discount" so a neighbor has to be
    // clearly closer (not just marginally) to take over, and flipping
    // which side of it we drop on requires clearing a dead-zone past its
    // center — the same idea as hysteresis on a Schmitt-trigger comparator,
    // so pointer jitter near a boundary doesn't cause rapid back-and-forth.
    const DRAG_STICKY_MARGIN = 24;
    const DRAG_EDGE_HYSTERESIS = 20;

    function clearDragHighlights() {
      document.querySelectorAll(".drop-move-target, .drop-merge-target").forEach(el => {
        el.classList.remove("drop-move-target", "drop-merge-target");
      });
    }

    function findDropTarget(x, y, excludeEl, current, gridEl, allowMerge) {
      const cards = [...gridEl.querySelectorAll(".card")].filter(el => el !== excludeEl);
      let nearest = null;
      let nearestDist = Infinity;

      for (const el of cards) {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        let dist = Math.hypot(x - cx, y - cy);
        if (current && el === current.element) dist -= DRAG_STICKY_MARGIN;
        if (dist < nearestDist) {
          nearestDist = dist;
          nearest = { element: el, cx, cy, rect };
        }
      }

      if (!nearest) return { element: null, placeBefore: true, mode: "move" };

      const mergeRadius = Math.min(nearest.rect.width, nearest.rect.height) * DRAG_MERGE_RADIUS_RATIO;
      const inMergeZone = allowMerge && Math.hypot(x - nearest.cx, y - nearest.cy) <= mergeRadius;
      if (inMergeZone) {
        return {
          element: nearest.element,
          placeBefore: current && current.element === nearest.element ? current.placeBefore : true,
          mode: "merge"
        };
      }

      let placeBefore;
      if (current && nearest.element === current.element) {
        placeBefore = current.placeBefore
          ? x < nearest.cx + DRAG_EDGE_HYSTERESIS
          : x < nearest.cx - DRAG_EDGE_HYSTERESIS;
      } else {
        placeBefore = x < nearest.cx;
      }

      return { element: nearest.element, placeBefore, mode: "move" };
    }

    function flipReorder(mutate, excludeEl, gridEl = grid) {
      const cards = [...gridEl.querySelectorAll(".card")].filter(el => el !== excludeEl);
      const firstRects = new Map(cards.map(el => [el, el.getBoundingClientRect()]));

      mutate();

      const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) return;

      for (const el of cards) {
        const first = firstRects.get(el);
        if (!first) continue;
        const last = el.getBoundingClientRect();
        const dx = first.left - last.left;
        const dy = first.top - last.top;
        if (!dx && !dy) continue;
        el.style.transition = "none";
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        requestAnimationFrame(() => {
          el.style.transition = "transform 0.24s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease";
          el.style.transform = "";
        });
      }
    }

    function cleanupPendingListeners(pending) {
      document.removeEventListener("pointermove", pending.moveFn);
      document.removeEventListener("pointerup", pending.endFn);
      document.removeEventListener("pointercancel", pending.endFn);
    }

    function onPendingEnd(event, pending) {
      cleanupPendingListeners(pending);
      if (pending.timer) clearTimeout(pending.timer);

      if (dragActive && dragActive.pointerId === pending.pointerId) {
        finishDrag();
        return;
      }

      if (dragPending === pending) dragPending = null;
    }

    function finishDrag() {
      const active = dragActive;
      const { card, ghost, context } = active;
      const mergeTargetId = active.lastDropMode === "merge" && active.lastTargetEl
        ? active.lastTargetEl.dataset.id
        : null;

      clearDragHighlights();
      ghost.remove();
      card.classList.remove("card-placeholder");
      card.classList.add("card-drop-settle");
      card.removeAttribute("aria-hidden");
      card.tabIndex = 0;
      card.style.touchAction = "";
      setTimeout(() => card.classList.remove("card-drop-settle"), 220);

      if (mergeTargetId && mergeItems(card.dataset.id, mergeTargetId, context)) {
        save();
        dragActive = null;
        isDragClick = true;
        renderAll();
        setTimeout(() => { isDragClick = false; }, 0);
        return;
      }

      const newOrder = [...context.grid.querySelectorAll(".card")].map(el => el.dataset.id).filter(Boolean);
      const collection = context.collection;

      if (newOrder.length === collection.length) {
        const byId = new Map(collection.map(b => [b.id, b]));
        const reordered = newOrder.map(id => byId.get(id)).filter(Boolean);
        if (reordered.length === collection.length) {
          collection.splice(0, collection.length, ...reordered);
          save();
          if (activeFolderId) render();
        }
      }

      dragActive = null;
      isDragClick = true;
      setTimeout(() => { isDragClick = false; }, 0);
    }

    function folderChildrenFor(item) {
      return isFolder(item) ? item.children : [item];
    }

    function replacePairWithFolder(collection, sourceIndex, targetIndex, folder) {
      const insertIndex = targetIndex - (sourceIndex < targetIndex ? 1 : 0);
      [sourceIndex, targetIndex]
        .sort((a, b) => b - a)
        .forEach(index => collection.splice(index, 1));
      collection.splice(insertIndex, 0, folder);
    }

    function mergeItems(sourceId, targetId, context) {
      if (!context.allowMerge || sourceId === targetId) return false;

      const collection = context.collection;
      const sourceIndex = collection.findIndex(item => item.id === sourceId);
      const targetIndex = collection.findIndex(item => item.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return false;

      const source = collection[sourceIndex];
      const target = collection[targetIndex];
      if (!source || !target) return false;

      if (isFolder(target)) {
        target.children.push(...folderChildrenFor(source));
        collection.splice(sourceIndex, 1);
        return true;
      }

      const folder = {
        id: uid(),
        type: "folder",
        name: "Folder",
        children: [target, ...folderChildrenFor(source)]
      };
      replacePairWithFolder(collection, sourceIndex, targetIndex, folder);
      return true;
    }

    function openModal(item = null) {
      if (item && isFolder(item)) {
        renameFolder(item.id);
        return;
      }

      closeMenus();
      editingId = item ? item.id : null;
      modalTitle.textContent = item ? "Edit Link" : "Add Link";
      nameInput.value = item ? item.name : "";
      urlInput.value = item ? item.url : "";
      iconInput.value = item ? item.icon || "" : "";
      modalBackdrop.classList.add("open");
      setTimeout(() => nameInput.focus(), 0);
    }

    function closeModalNow() {
      modalBackdrop.classList.remove("open");
      bookmarkForm.reset();
      editingId = null;
    }

    function renameFolder(id) {
      closeMenus();
      const match = findItemById(id);
      if (!match || !isFolder(match.item)) return;

      const nextName = prompt("Folder name", match.item.name);
      if (nextName === null) return;

      const name = nextName.trim().slice(0, 40);
      if (!name) return;

      match.item.name = name;
      save();
      renderAll();
    }

    function deleteBookmark(id) {
      const match = findItemById(id);
      if (!match) return;
      const item = match.item;
      if (!confirm(`Delete "${item.name}"?`)) return;
      match.collection.splice(match.index, 1);
      if (activeFolderId === id) closeFolderLayer();
      save();
      renderAll();
    }

    bookmarkForm.addEventListener("submit", event => {
      event.preventDefault();

      const data = {
        name: nameInput.value.trim(),
        url: normalizeUrl(urlInput.value),
        icon: iconInput.value.trim()
      };

      if (!data.name || !data.url) return;

      if (editingId) {
        const match = findItemById(editingId);
        if (match && !isFolder(match.item)) Object.assign(match.item, data);
      } else {
        bookmarks.unshift({ id: uid(), ...data });
      }

      save();
      closeModalNow();
      renderAll();
    });

    searchInput.addEventListener("input", render);
    openSidebar.addEventListener("click", openSidebarNow);
    closeSidebar.addEventListener("click", closeSidebarNow);
    sidebarBackdrop.addEventListener("click", closeSidebarNow);
    addButton.addEventListener("click", () => {
      closeSidebarNow();
      openModal();
    });
    themeButton.addEventListener("click", () => {
      const nextTheme = document.body.classList.contains("light-mode") ? "terminal" : "bright";
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
      closeSidebarNow();
    });
    closeModal.addEventListener("click", closeModalNow);
    cancelButton.addEventListener("click", closeModalNow);
    folderClose.addEventListener("click", closeFolderLayer);

    folderLayer.addEventListener("click", event => {
      if (event.target === folderLayer) closeFolderLayer();
    });

    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) closeModalNow();
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".card-menu") && !event.target.closest(".menu-btn")) closeMenus();
    });

    document.addEventListener("keydown", event => {
      const cmdK = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k";
      if (cmdK) {
        event.preventDefault();
        searchInput.focus();
      }
      if (event.key === "Escape") {
        closeMenus();
        if (sidebar.classList.contains("open")) closeSidebarNow();
        if (modalBackdrop.classList.contains("open")) {
          closeModalNow();
        } else if (folderLayer.classList.contains("open")) {
          closeFolderLayer();
        }
      }
    });

    exportButton.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(bookmarks, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "bookmarks.json";
      a.click();
      URL.revokeObjectURL(a.href);
      closeSidebarNow();
    });

    importButton.addEventListener("click", () => {
      importFile.click();
      closeSidebarNow();
    });

    importFile.addEventListener("change", async () => {
      const file = importFile.files[0];
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!Array.isArray(imported)) throw new Error("Invalid file");
        bookmarks = imported.map(normalizeStoredItem).filter(Boolean);
        if (!bookmarks.length) throw new Error("Invalid file");
        closeFolderLayer();
        save();
        renderAll();
      } catch {
        alert("Could not import this JSON file.");
      } finally {
        importFile.value = "";
      }
    });

    resetButton.addEventListener("click", () => {
      if (!confirm("Reset all bookmarks to the default list?")) return;
      localStorage.removeItem(STORAGE_KEY);
      load();
      closeFolderLayer();
      renderAll();
      closeSidebarNow();
    });

    loadTheme();
    load();
    render();
  </script>
</body>
</html>
